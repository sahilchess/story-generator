<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Generator</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts  -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geomini:wght@200..800&family=Instrument+Serif:ital@0;1&family=Playwrite+ID:wght@100..400&display=swap" rel="stylesheet">

</head>
<body>
  <div class="main-container">
    <h1>Story Generator</h1>

    <button id="generateStoryBtn">Start Generating Story</button>
    <div>
      <button id="LeftStoryBtn"></button>
      <button id="RightStoryBtn"></button>
    </div>
    <button id="StopBtn"></button>

    <div id="aiThinkText">
      <p id="aiThinkTextP" class="ai-thinking-font-italic"></p>
    </div>

    <div id="storyOutput"></div>
  </div>


  <script src="script.js"></script>
</body>
</html>
